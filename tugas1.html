<!DOCTYPE html>
<html>
<head>
    <title>Portfolio</title>
    <style>
        .profile {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
        }
        nav a { margin-right: 15px; text-decoration: none; }
        form input, form textarea { margin-bottom: 10px; width: 200px; }
    </style>
    </div>
</head>
<body>

<header>
    <nav>
    <a href="#home">Home</a>
    <a href="#about">About</a>
    <a href="#contact">Contact</a>
    </nav>
</header>

<main>

<section id="home">
    <img src="img/foto_saya.jpeg" class="profile">
    <h1>Febriana FW Maniani</h1>
</section>

<section id="about">
    <h2>About Me</h2>
    <p>Menjadi web developer yang mampu membuat website profesional dan bermanfaat.</p>
</section>

<section id="contact">
    <h2>Contact</h2>
    <form>
        <input type="text" placeholder="Nama"><br>
        <input type="email" placeholder="Email"><br>
        <textarea placeholder="Pesan"></textarea><br>
        <button>Kirim</button>
    </form>
</section>
<section id="portfolio">
    <h2>Portfolio</h2>

    <div class="portfolio">
        <img src="img/project1.png" alt="Project 1">
        <img src="img/project2.png" alt="Project 2">
    </div>
</section>
</main>

</body>
</html>
