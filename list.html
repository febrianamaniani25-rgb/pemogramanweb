<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biodata Febriana F.W Maniani</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #e9ecef; /* Warna latar belakang halaman */
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            background-color: #211668;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        /* Foto Utama */
        .profile-pic-container {
            text-align: center;

            border: 3px solid #0056b3;
        }

        h1, h2 { text-align: center; color: #333; }

        .edu-item {
            display: flex;
            align-items: center; 
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .edu-item:hover {
            background-color: #97c1eb;
        }

        .logo-sekolah {
            width: 60px; /
            height: 60px;
            object-fit: contain; 
            margin-right: 20px; 
        }

        .edu-text {
            font-size: 1.1em;
            font-weight: bold;
            color: #8beabe;
        }

        .details-list {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }

        .details-list li {
            padding: 8px 0;
            border-bottom: 1px dashed #e883f1;
        }

</head>
<body>

    <div class="container">

            <li><strong>Nama:</strong> Febriana F.W Maniani</li>
            <li><strong>Program Studi:</strong> Teknik Informatika</li>
        </ul>

        <h2>Education Background</h2>

            <img src="logo_smp.png" alt="Logo SMP" class="logo-sekolah">

        </div>

            <img src="logo_sma.png" alt="Logo SMA" class="logo-sekolah">
